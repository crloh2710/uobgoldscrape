name: Daily Gold Price Scraper
on:
  #10am/pm
  schedule:
    - cron: '0 2 * * *' 
    - cron: '0 14 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
      - name: Install system dependencies and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libuv1-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev
          curl -fsSL https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -o chrome.deb
          sudo apt-get install -y ./chrome.deb
          rm chrome.deb
      - name: Set up R
        id: setup-r
        uses: r-lib/actions/setup-r@v2.11.0
      - name: Cache R packages
        uses: actions/cache@v4.2.2
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ runner.os }}-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('pkg_lockfile.lock') }}
          restore-keys: r-packages-${{ runner.os }}-
      - name: Install R packages
        env:
          PKG_SYSREQS: false
          PKGDEPENDS_SYSREQS: false
        run: |
          Rscript -e "install.packages('pak', repos='https://cloud.r-project.org')"
          Rscript -e "
            options(pkg.sysreqs = FALSE)
            pak::pkg_install(c('netstat', 'tidyverse', 'dplyr', 'rvest', 'chromote'))
          "
      - name: Run scraper
        env:
          CHROMOTE_CHROME_PATH: /usr/bin/google-chrome-stable
        run: Rscript goldprices.R
      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prices.csv
          git commit -m "Update gold prices $(date +'%Y-%m-%d')" || echo "No changes"
          git push
