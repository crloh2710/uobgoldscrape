name: Daily Price Scraper

on:
  schedule:
    - cron: '0 0 * * *' # runs at 8am SGT
  workflow_dispatch:      

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: Rscript -e "install.packages(c('netstat', 'tidyverse', 'binman’,’wdman’,’chromote’, ‘rvest’), repos='https://cloud.r-project.org')"

      - name: Run scraper
        run: Rscript goldprices.R

      - name: Commit and push updated csv file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prices.csv
          git commit -m "Update prices $(date +'%Y-%m-%d')" || echo "No changes"
          git push
